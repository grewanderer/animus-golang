apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-dev
  labels:
    app: vault-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault-dev
  template:
    metadata:
      labels:
        app: vault-dev
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15.6
          args: ["server", "-dev", "-dev-root-token-id=animus-dev-token"]
          env:
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
          ports:
            - name: http
              containerPort: 8200
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: vault-dev
  labels:
    app: vault-dev
spec:
  selector:
    app: vault-dev
  ports:
    - name: http
      port: 8200
      targetPort: 8200
      protocol: TCP
