    get:
      summary: List models
      tags: [Models]
      security:
        - bearerAuth: []
      operationId: gatewayListModels
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Optional exact name filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
          description: Max number of models to return.
      responses:
