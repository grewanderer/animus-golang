        "502":
          $ref: "#/components/responses/BadGateway"
    put:
      summary: Proxy PUT to Audit
      tags: [Proxy]
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ProxiedOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/BadGateway"
    patch:
      summary: Proxy PATCH to Audit
      tags: [Proxy]
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ProxiedOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/BadGateway"
    delete:
      summary: Proxy DELETE to Audit
      tags: [Proxy]
      security:
        - bearerAuth: []
      responses:
        "200":
          $ref: "#/components/responses/ProxiedOK"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/BadGateway"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    ProxiedOK:
      description: Proxied response from upstream service
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadGateway:
      description: Upstream error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [service, status]
      properties:
        service:
          type: string
        status:
          type: string
    StatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
    SessionResponse:
      type: object
      additionalProperties: false
      required: [subject, email, roles]
      properties:
        subject:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
    ForceLogoutRequest:
      type: object
      additionalProperties: false
      properties:
        session_id:
          type: string
        subject:
          type: string
        reason:
          type: string
      description: Provide either session_id or subject.
    ForceLogoutResponse:
      type: object
      additionalProperties: false
      required: [revoked]
      properties:
        revoked:
          type: integer
    ErrorResponse:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
        request_id:
          type: string
