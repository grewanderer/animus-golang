name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      GOCACHE: ${{ runner.temp }}/go-build-cache
      GOMODCACHE: ${{ runner.temp }}/go-mod-cache
      GOTMPDIR: ${{ runner.temp }}/go-tmp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: make bootstrap
      - name: install golangci-lint
        run: |
          mkdir -p .bin
          GOBIN="${PWD}/.bin" go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          echo "${PWD}/.bin" >> "${GITHUB_PATH}"
          "${PWD}/.bin/golangci-lint" version
      - run: make lint
      - run: make openapi-lint
      - run: make test

  supply-chain:
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      GOCACHE: ${{ runner.temp }}/go-build-cache
      GOMODCACHE: ${{ runner.temp }}/go-mod-cache
      GOTMPDIR: ${{ runner.temp }}/go-tmp
      VULN_FAIL_ON: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make supply-chain
      - name: upload supply-chain reports
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-reports
          path: .cache/supply-chain

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      GOCACHE: ${{ runner.temp }}/go-build-cache
      GOMODCACHE: ${{ runner.temp }}/go-mod-cache
      GOTMPDIR: ${{ runner.temp }}/go-tmp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: make e2e
